## Local development only — PostgreSQL + PostGIS for testing.
## Production uses AWS RDS. See docs/AWS_DEPLOYMENT.md for details.

services:
  # ── PostgreSQL + PostGIS (local dev) ────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ps_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-propertysearch}
      POSTGRES_USER: ${POSTGRES_USER:-propertysearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-propertysearch}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
